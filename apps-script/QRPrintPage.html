<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap">
  <style>
    :root {
      --negro: #0a0a0a;
      --negro-soft: #141414;
      --negro-card: #1a1a1a;
      --negro-border: #2a2a2a;
      --rojo: #dc2626;
      --rojo-hover: #ef4444;
      --rojo-glow: rgba(220, 38, 38, 0.4);
      --texto: #f5f5f5;
      --texto-muted: #a3a3a3;
      --texto-dim: #525252;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--negro);
      color: var(--texto);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 1;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, var(--rojo) 50%, transparent 100%);
      z-index: 9999;
    }
    .print-stage {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .card {
      width: 10.5cm;
      height: 14.8cm;
      background: var(--negro-card);
      border: 1px solid var(--negro-border);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }
    .card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--rojo) 50%, transparent 100%);
    }
    .card-header {
      background: linear-gradient(135deg, var(--negro-soft) 0%, var(--negro-card) 100%);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .brand-block { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .logo-taller-img { display: none; max-height: 40px; max-width: 90px; height: auto; }
    .logo-placeholder {
      width: 80px;
      height: 40px;
      background: var(--negro-soft);
      border: 2px dashed var(--rojo);
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--rojo);
      font-weight: 700;
      font-size: 10px;
      letter-spacing: 1.5px;
    }
    .logo-placeholder svg { opacity: 0.85; }
    .brand-text { display: flex; flex-direction: column; line-height: 1.1; min-width: 0; }
    .brand-nombre {
      font-family: 'Oswald', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--texto);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .brand-sub {
      font-size: 9px;
      font-weight: 700;
      color: var(--rojo);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-top: 2px;
    }
    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      gap: 6px;
      min-height: 0;
    }
    .qr-wrap {
      background: #ffffff;
      padding: 6px;
      border: 2px solid var(--rojo);
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(220, 38, 38, 0.3);
      flex-shrink: 0;
    }
    #qr-print {
      width: 170px;
      height: 170px;
      display: block;
    }
    .vehiculo-info {
      width: 100%;

    }
    .vehiculo-patente {
      font-family: 'Oswald', sans-serif;

      color: var(--rojo);

      text-transform: uppercase;
    }
    .vehiculo-line {
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 6px;
      font-size: 11px;
      color: var(--texto);
      font-weight: 500;
      margin-bottom: 3px;
    }
    .vehiculo-line .lbl {
      color: var(--rojo);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 9px;
    }
    .vehiculo-cliente {
      display: flex;

      align-items: baseline;
      gap: 6px;
      font-size: 11px;
      color: var(--texto-muted);

    .vehiculo-cliente .lbl {
      color: var(--rojo);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;

    .card-footer {

    .action-bar {

    .action-btn {
      background: var(--negro-card);

      padding: 12px 20px;
      border-radius: 999px;

      align-items: center;

    .action-btn:hover { transform: translateY(-1px); }
    .action-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .print-btn {

    .share-btn:hover { border-color: var(--rojo); color: var(--rojo); }
    .pdf-btn:hover { border-color: var(--rojo); color: var(--rojo); }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--negro-card);
      color: var(--texto);
      border: 1px solid var(--negro-border);
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      z-index: 2000;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
      animation: toast-in 0.2s ease-out;
    }
    .toast.success { border-color: #16a34a; color: #4ade80; }
    .toast.error { border-color: var(--rojo); color: var(--rojo); }
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @page {
      margin: 0;
    }
    @media print {
      body {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        background: white !important;
        margin: 0 !important;
        padding: 0 !important;
      }
      body > *:not(.print-stage) { display: none !important; }
      .print-stage {
        position: static !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;

      body::before, body::after { display: none !important; }
    }
  </style>
</head>

  <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>

  <script>
    const TALLER_NOMBRE = 'Mecánica Martínez';
    const TALLER_INSTAGRAM = 'https://www.instagram.com/martinez_mecanicaautomotriz/';
    const TALLER_INSTAGRAM_HANDLE = '@martinez_mecanicaautomotriz';
    const TALLER_TELEFONO = '3442-625581';
    const TALLER_TELEFONO_WA = '5493442625581';
    const LOGO_URL = 'https://lh3.googleusercontent.com/d/1WDYg8rkNyRedO_ZINDX35eQyWNQdQ5yW';

    const urlCliente = <?= JSON.stringify(urlCliente) ?>;
    const qr = new QRCodeStyling({
      width: 170,
      height: 170,
      data: urlCliente,
      image: '',
      dotsOptions: { color: '#0a0a0a', type: 'rounded' },
      backgroundOptions: { color: '#ffffff' },
      imageOptions: { crossOrigin: 'anonymous', margin: 6 },
      qrOptions: { errorCorrectionLevel: 'M' }
    });
    qr.append(document.getElementById('qr-print'));

    (function initLogo() {
      if (!LOGO_URL || LOGO_URL === 'PLACEHOLDER_LOGO_URL') return;
      const img = document.getElementById('logoTaller');
      const placeholder = document.getElementById('logoPlaceholder');
      if (!img || !placeholder) return;
      img.onload = function () { img.style.display = 'block'; placeholder.style.display = 'none'; };
      img.onerror = function () { img.style.display = 'none'; placeholder.style.display = ''; };
      img.src = LOGO_URL;
    })();

    function mostrarToast(mensaje, tipo) {
      const toast = document.createElement('div');
      toast.className = 'toast' + (tipo ? ' ' + tipo : '');
      toast.textContent = mensaje;
      document.body.appendChild(toast);
      setTimeout(function () {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(function () { toast.remove(); }, 300);
      }, 2500);
    }

    async function compartirTarjeta() {
      const titulo = 'Historial de mi vehículo - Mecánica Martínez';
      const texto = 'Patente: ' + (<?= JSON.stringify(vehiculo.Patente) ?>) + ' - ' + (<?= JSON.stringify(vehiculo.Marca) ?>) + ' ' + (<?= JSON.stringify(vehiculo.Modelo) ?>) + '. Escaneá el QR o ingresá a este link para ver el historial completo.';
      const url = <?= JSON.stringify(urlCliente) ?>;

      if (navigator.share) {
        try {
          await navigator.share({ title: titulo, text: texto, url: url });
          return;
        } catch (err) {
          if (err.name === 'AbortError') return;
        }
      }
      mostrarFallbackCompartir(texto, url);
    }

    function mostrarFallbackCompartir(texto, url) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function () {
          const waUrl = 'https://wa.me/?text=' + encodeURIComponent(texto + ' ' + url);
          mostrarToast('Link copiado. WhatsApp: ' + waUrl, 'success');
        }).catch(function () {
          prompt('Copiá este link:', url);
        });
      } else {
        prompt('Copiá este link:', url);
      }
    }

    async function descargarPDF() {
      const btn = event.target.closest('.pdf-btn');
      if (!btn) return;
      const textoOriginal = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Generando...';

      try {
        if (!window.jspdf || !window.jspdf.jsPDF) {
          throw new Error('jsPDF no está disponible');
        }
        if (typeof html2canvas !== 'function') {
          throw new Error('html2canvas no está disponible');
        }

        const { jsPDF } = window.jspdf;
        const cardElement = document.querySelector('.card');
        if (!cardElement) throw new Error('No se encontró la tarjeta');

        const canvas = await html2canvas(cardElement, {
          scale: 3,
          backgroundColor: '#0a0a0a',
          useCORS: true,
          logging: false
        });

        const imgData = canvas.toDataURL('image/png');
        const pdf = new jsPDF({
          orientation: 'portrait',
          unit: 'mm',
          format: 'a6'
        });

        const pdfWidth = pdf.internal.pageSize.getWidth();
        const pdfHeight = pdf.internal.pageSize.getHeight();
        pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);

        const patente = (<?= JSON.stringify(vehiculo.Patente) ?>).replace(/\s+/g, '_');
        pdf.save('QR_Martinez_' + patente + '.pdf');

        mostrarToast('PDF descargado', 'success');
      } catch (err) {
        mostrarToast('Error generando PDF: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = textoOriginal;
      }
    }
  </script>
</body>
</html>
