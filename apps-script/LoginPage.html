<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acceso · Mecánica Martínez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@500;600;700&display=swap">
  <style>
    :root {
      --negro: #0a0a0a;
      --negro-soft: #141414;
      --negro-card: #1a1a1a;
      --negro-border: #2a2a2a;
      --rojo: #dc2626;
      --rojo-hover: #ef4444;
      --rojo-glow: rgba(220, 38, 38, 0.4);
      --texto: #f5f5f5;
      --texto-muted: #a3a3a3;
      --texto-dim: #525252;
      --success: #10b981;
      --warning: #f59e0b;
      --error: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--negro);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 1;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, var(--rojo) 50%, transparent 100%);
      z-index: 9999;
    }
    .card {
      background: var(--negro-card);
      border: 1px solid var(--negro-border);
      border-radius: 16px;
      padding: 40px 28px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(220, 38, 38, 0.05);
      position: relative;
      z-index: 2;
    }
    h1 {
      margin: 0 0 6px;
      font-family: 'Oswald', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--texto);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
    }
    .subtitle {
      margin: 0 0 24px;
      color: var(--texto-muted);
      font-size: 13px;
      text-align: center;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .input-wrap {
      position: relative;
      margin-bottom: 14px;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--texto-dim);
      pointer-events: none;
      display: flex;
      align-items: center;
    }
    input[type="password"] {
      width: 100%;
      padding: 14px 14px 14px 44px;
      font-size: 15px;
      border: 1px solid var(--negro-border);
      border-radius: 10px;
      background: var(--negro);
      font-family: inherit;
      color: var(--texto);
      outline: none;
      transition: all 0.2s;
    }
    input[type="password"]:focus {
      border-color: var(--rojo);
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15);
      background: var(--negro-soft);
    }
    input[type="password"]::placeholder { color: var(--texto-dim); }
    .btn-primary {
      width: 100%;
      padding: 14px 28px;
      background: var(--rojo);
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      box-shadow: 0 0 0 0 var(--rojo-glow);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--rojo-hover);
      box-shadow: 0 0 24px 4px var(--rojo-glow);
      transform: translateY(-1px);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled {
      background: var(--negro-border);
      color: var(--texto-dim);
      cursor: not-allowed;
      box-shadow: none;
    }
    .error {
      margin-top: 12px;
      color: var(--error);
      font-size: 13px;
      min-height: 18px;
      text-align: center;
      font-weight: 500;
    }
    .card-brand { text-align: center; margin-bottom: 18px; }
    .logo-taller-img { display: none; max-height: 120px; max-width: 200px; height: auto; margin: 0 auto; }
    .logo-placeholder {
      width: 200px; height: 100px;
      background: var(--negro-soft);
      border: 2px dashed var(--rojo);
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      color: var(--rojo); font-weight: 700; font-size: 14px;
      letter-spacing: 2px;
      margin: 0 auto;
    }
    .taller-nombre {
      font-family: 'Oswald', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--texto);
      margin: 18px 0 4px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .taller-subtitulo {
      font-size: 11px;
      color: var(--rojo);
      font-weight: 600;
      margin: 0 0 22px;
      text-align: center;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .taller-contact {
      display: flex; gap: 14px; align-items: center; justify-content: center;
      flex-wrap: wrap;
      font-size: 12px; color: var(--texto-muted);
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--negro-border);
    }
    .taller-contact a {
      color: var(--rojo);
      text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
      font-weight: 600;
      transition: all 0.2s;
      padding: 6px 10px;
      border-radius: 8px;
    }
    .taller-contact a:hover {
      color: var(--rojo-hover);
      background: rgba(220, 38, 38, 0.08);
      box-shadow: 0 0 16px rgba(220, 38, 38, 0.25);
    }
    .taller-contact svg { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-brand">
      <img id="logoTaller" class="logo-taller-img" alt="Logo del taller">
      <div id="logoPlaceholder" class="logo-placeholder">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor" aria-hidden="true"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"/></svg>
        <span>LOGO</span>
      </div>
    </div>
    <h1>Panel del Taller</h1>
    <p class="taller-subtitulo">Acceso mecánico</p>
    <div class="input-wrap">
      <span class="input-icon">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
      </span>
      <input type="password" id="password" placeholder="Contraseña" autofocus>
    </div>
    <button id="btnLogin" class="btn-primary">Ingresar</button>

    <p class="taller-nombre">Mecánica Martínez</p>
    <div class="taller-contact">
      <a href="tel:5493442625581">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 19.99 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.97-.99z"/></svg>

      </a>

        @martinez_mecanicaautomotriz
      </a>
    </div>
  </div>
  <script>
    const TALLER_NOMBRE = 'Mecánica Martínez';
    const TALLER_INSTAGRAM = 'https://www.instagram.com/martinez_mecanicaautomotriz/';
    const TALLER_INSTAGRAM_HANDLE = '@martinez_mecanicaautomotriz';
    const TALLER_TELEFONO = '3442-625581';
    const TALLER_TELEFONO_WA = '5493442625581';
    const LOGO_URL = 'https://lh3.googleusercontent.com/d/1WDYg8rkNyRedO_ZINDX35eQyWNQdQ5yW';

    const input = document.getElementById('password');
    const btn = document.getElementById('btnLogin');
    const error = document.getElementById('error');

    btn.addEventListener('click', doLogin);
    input.addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });

    function callBackend(functionName, ...args) {
      return new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          [functionName](...args);
      });
    }

    async function doLogin() {
      const password = input.value.trim();
      if (!password) { error.textContent = 'Ingresá una contraseña'; return; }
      btn.disabled = true;
      btn.textContent = 'Ingresando...';
      error.textContent = '';
      try {
        const data = await callBackend('apiLogin', password);
        if (data.ok) {
          localStorage.setItem('mecanicoSession', data.token);
          window.location.href = '<?= webappUrl ?>?accion=admin&session=' + data.token;
        } else {
          error.textContent = data.error || 'Error';
          btn.disabled = false;
          btn.textContent = 'Ingresar';
        }
      } catch (err) {
        error.textContent = 'Error: ' + (err.message || err);
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    }

    (function initLogo() {
      const img = document.getElementById('logoTaller');
      const placeholder = document.getElementById('logoPlaceholder');
      if (!img || !placeholder || !LOGO_URL || LOGO_URL === 'PLACEHOLDER_LOGO_URL') return;
      img.onload = function () { img.style.display = 'block'; placeholder.style.display = 'none'; };
      img.onerror = function () { img.style.display = 'none'; placeholder.style.display = ''; };
      img.src = LOGO_URL;
    })();
  </script>
</body>
</html>
